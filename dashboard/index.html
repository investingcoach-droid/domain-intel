<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency 360 — Competitor Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0e14;
  --bg2:     #131720;
  --bg3:     #1a2030;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text:    #dde1ef;
  --muted:   #5a6278;
  --dim:     #8b93ab;
  --font:    'Syne', sans-serif;
  --mono:    'DM Mono', monospace;
  --c-pn:   #4f8eff;
  --c-bmp:  #f97316;
  --c-fsbo: #a855f7;
  --c-sbho: #10b981;
  --c-nap:  #ef4444;
  --c-rb:   #06b6d4;
  --c-mta:  #eab308;
  --sale-c:   #4f8eff;
  --sold-c:   #00d4a0;
  --rent-c:   #c084fc;
  --leased-c: #ffd166;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.logo{width:26px;height:26px;border-radius:5px;background:var(--c-nap);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
.topbar-title{font-size:14px;font-weight:700;}
.topbar-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:10px;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{font-size:12px;font-weight:600;padding:5px 14px;border-radius:5px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);letter-spacing:.02em;transition:all .15s;}
.nav-tab:hover{color:var(--text);background:var(--bg3);}
.nav-tab.active{color:var(--text);background:var(--bg3);border:1px solid var(--border2);}
.last-run{font-size:10px;color:var(--muted);font-family:var(--mono);}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--c-nap);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:12px;color:var(--muted);font-family:var(--mono);}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:16px 20px;margin:32px;font-size:12px;font-family:var(--mono);color:#fca5a5;line-height:1.8;}

/* ── PAGES ── */
.page{display:none;padding:24px 28px;}
.page.active{display:block;}

/* ── OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;}
.comp-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.comp-card:hover{border-color:var(--border2);background:var(--bg3);}
.comp-card.is-us{border-color:rgba(239,68,68,.2);}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.card-name{font-size:14px;font-weight:700;}
.card-slug{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.us-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(239,68,68,.15);color:#ef4444;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.cs{text-align:center;}
.cs-val{font-size:17px;font-weight:700;line-height:1;}
.cs-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.cs.sale .cs-val{color:var(--sale-c);}
.cs.sold .cs-val{color:var(--sold-c);}
.cs.rent .cs-val{color:var(--rent-c);}
.cs.leased .cs-val{color:var(--leased-c);}
.delta-pill{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:10px;margin-top:8px;display:inline-block;}
.delta-pill.has-data{background:rgba(0,212,160,.12);color:#00d4a0;}
.delta-pill.no-data{background:rgba(90,98,120,.12);color:var(--muted);}

/* ── COMPARE ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.compare-section{margin-bottom:28px;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.chart-title{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:2px;}
.chart-note{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:14px;}
.chart-wrap{position:relative;width:100%;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── LEADERBOARD ── */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{padding:8px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.lb-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tbody tr:hover{background:var(--bg3);}
.rank-num{font-family:var(--mono);font-size:11px;color:var(--muted);}
.rank-1 .rank-num{color:#ffd166;font-weight:700;}
.rank-2 .rank-num{color:#b0b7c3;font-weight:700;}
.rank-3 .rank-num{color:#cd7c3a;font-weight:700;}
.comp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;}
.name-cell{display:flex;align-items:center;}
.us-tag{font-size:9px;color:var(--c-nap);font-family:var(--mono);margin-left:6px;opacity:.8;}
.bar-bg{background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:3px;}
.num-cell{font-family:var(--mono);font-size:12px;text-align:right;}

/* ── DETAIL ── */
.back-btn{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--font);padding:5px 0;margin-bottom:16px;display:block;}
.back-btn:hover{color:var(--text);}
.detail-name{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.detail-slug{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;margin-bottom:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.sale::before{background:var(--sale-c);}
.stat-card.sold::before{background:var(--sold-c);}
.stat-card.rent::before{background:var(--rent-c);}
.stat-card.leased::before{background:var(--leased-c);}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.stat-sub{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:4px;}
.stat-card.sale .stat-val{color:var(--sale-c);}
.stat-card.sold .stat-val{color:var(--sold-c);}
.stat-card.rent .stat-val{color:var(--rent-c);}
.stat-card.leased .stat-val{color:var(--leased-c);}
.delta-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.delta-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.delta-type{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.delta-num{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.delta-na{font-size:16px;color:var(--muted);padding-top:5px;}
.delta-sub{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px;}

/* ── HISTORY TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.tab-row{display:flex;gap:4px;}
.ltab{font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);transition:all .12s;}
.ltab:hover{color:var(--text);background:var(--bg3);}
.ltab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.ltab.sale.active{color:var(--sale-c);}
.ltab.sold.active{color:var(--sold-c);}
.ltab.rent.active{color:var(--rent-c);}
.ltab.leased.active{color:var(--leased-c);}
.total-tag{font-size:10px;color:var(--muted);font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{padding:8px 16px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
td{padding:9px 16px;font-size:12px;color:var(--dim);}
td.mono{font-family:var(--mono);font-size:10px;color:var(--muted);}
td.price{font-weight:600;color:var(--text);}
td a{color:var(--c-pn);text-decoration:none;font-family:var(--mono);font-size:10px;}
td a:hover{text-decoration:underline;}
.pill{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;margin-right:3px;}
.bed-pill{background:rgba(79,142,255,.1);color:#7ab3ff;}
.bath-pill{background:rgba(192,132,252,.1);color:#d8b4fe;}

/* ── HISTORY CHART ── */
.history-chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .2s ease forwards;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">A</div>
    <span class="topbar-title">Agency 360</span>
    <span class="topbar-sub">Competitor Intelligence · domain.com.au</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('overview')">Overview</button>
      <button class="nav-tab" onclick="showPage('compare')">Compare</button>
      <button class="nav-tab" onclick="showPage('leaderboard')">Leaderboard</button>
    </div>
    <span class="last-run" id="lastRun">Loading...</span>
  </div>
</div>

<div id="page-overview" class="page active">
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div class="load-text">Fetching latest data from Supabase...</div>
  </div>
  <div id="overviewGrid" class="overview-grid" style="display:none;"></div>
</div>

<div id="page-compare"     class="page"></div>
<div id="page-leaderboard" class="page"></div>
<div id="page-detail"      class="page"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── CONFIG ── injected at build time by Cloudflare Pages ──────────────────
// These are safe to expose — they are the ANON (read-only) key, not service_role
const SUPABASE_URL = window.SUPABASE_URL || '__SUPABASE_URL__';
const SUPABASE_KEY = window.SUPABASE_KEY || '__SUPABASE_ANON_KEY__';

// ─── COMPETITOR METADATA (colours, display names etc) ─────────────────────
const COMP_META = {
  'propertynow-10282':         { name:'Property Now',     shortName:'PN',   color:'#4f8eff', isUs:false },
  'forsalebyowner-20095':      { name:'For Sale By Owner',shortName:'FSBO', color:'#a855f7', isUs:false },
  'buymyplace-17238':          { name:'buymyplace',       shortName:'BMP',  color:'#f97316', isUs:false },
  'salebyhomeownercomau-31710':{ name:'SaleByHomeOwner',  shortName:'SBHO', color:'#10b981', isUs:false },
  'noagentproperty-20869':     { name:'No Agent Property',shortName:'NAP',  color:'#ef4444', isUs:true  },
  'rentbetter-27499':          { name:'RentBetter',       shortName:'RB',   color:'#06b6d4', isUs:false },
  'minustheagent-26625':       { name:'Minus The Agent',  shortName:'MTA',  color:'#eab308', isUs:false },
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let DATA         = [];   // latest stats row per competitor
let HISTORY      = {};   // slug -> array of stats rows (all time)
let SNAPSHOTS    = {};   // slug -> latest listing_snapshots rows
let charts       = {};
let detailSlug   = null;
let detailTab    = 'sale';

// ─── SUPABASE FETCH ────────────────────────────────────────────────────────
async function sbFetch(table, params) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${params}`;
  const res = await fetch(url, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase error ${res.status} on ${table}`);
  return res.json();
}

async function loadData() {
  try {
    // Latest stats per competitor (most recent row for each slug)
    const allStats = await sbFetch('agency_stats',
      'order=scraped_at.desc&limit=200'
    );

    // Deduplicate: keep only the latest row per slug
    const seen = new Set();
    DATA = [];
    for (const row of allStats) {
      if (!seen.has(row.agency_slug)) {
        seen.add(row.agency_slug);
        DATA.push(row);
      }
    }

    // All history per competitor for trend charts (last 90 days)
    const historyRows = await sbFetch('agency_stats',
      'order=scraped_at.asc&limit=2000'
    );
    HISTORY = {};
    for (const row of historyRows) {
      if (!HISTORY[row.agency_slug]) HISTORY[row.agency_slug] = [];
      HISTORY[row.agency_slug].push(row);
    }

    // Latest listing snapshots per competitor
    const allSnaps = await sbFetch('listing_snapshots',
      'order=scraped_at.desc&limit=500'
    );
    SNAPSHOTS = {};
    for (const row of allSnaps) {
      if (!SNAPSHOTS[row.agency_slug]) SNAPSHOTS[row.agency_slug] = {};
      if (!SNAPSHOTS[row.agency_slug][row.listing_type]) {
        SNAPSHOTS[row.agency_slug][row.listing_type] = row;
      }
    }

    // Update last run label
    const latest = allStats[0];
    if (latest) {
      document.getElementById('lastRun').textContent =
        'Last scraped: ' + latest.scraped_at_melb;
    }

    // Hide spinner, show content
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('overviewGrid').style.display = '';
    renderOverview();

  } catch(err) {
    document.getElementById('loadingState').innerHTML =
      `<div class="error-box">
        <strong>Could not load data</strong><br><br>
        ${err.message}<br><br>
        Check that SUPABASE_URL and SUPABASE_ANON_KEY are set correctly<br>
        in your Cloudflare Pages environment variables.
      </div>`;
  }
}

// ─── ROUTING ───────────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}
function showPage(page, slug) {
  destroyCharts();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const nt = document.querySelector(`.nav-tab[onclick*="'${page}'"]`);
  if (nt) nt.classList.add('active');
  if (page === 'detail') {
    detailSlug = slug; detailTab = 'sale';
    document.getElementById('page-detail').classList.add('active');
    renderDetail();
  } else {
    document.getElementById(`page-${page}`).classList.add('active');
    if (page === 'overview')    renderOverview();
    if (page === 'compare')     renderCompare();
    if (page === 'leaderboard') renderLeaderboard();
  }
}

// ─── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = '';
  // Sort: NAP (us) first, then by For Sale descending
  const sorted = [...DATA].sort((a,b) => {
    const am = COMP_META[a.agency_slug], bm = COMP_META[b.agency_slug];
    if (am?.isUs) return -1; if (bm?.isUs) return 1;
    return (b.for_sale||0) - (a.for_sale||0);
  });
  sorted.forEach(row => {
    const meta  = COMP_META[row.agency_slug] || { name: row.agency_name, color:'#888', isUs:false };
    const snaps = SNAPSHOTS[row.agency_slug] || {};
    const saleDelta = snaps.sale?.new_since_yesterday;
    const div = document.createElement('div');
    div.className = `comp-card${meta.isUs ? ' is-us' : ''} fade`;
    div.style.cssText = `--card-color:${meta.color}`;
    div.querySelector !== undefined && (div.style.setProperty('--card-color', meta.color));
    div.setAttribute('style', `--card-color:${meta.color}`);
    div.innerHTML = `
      <style>.comp-card[style="--card-color:${meta.color}"]::before{background:${meta.color}}</style>
      <div class="card-header">
        <div>
          <div class="card-name">${meta.name}</div>
          <div class="card-slug">${row.agency_slug}</div>
        </div>
        ${meta.isUs ? '<span class="us-badge">Our platform</span>' : ''}
      </div>
      <div class="card-stats">
        <div class="cs sale"><div class="cs-val">${(row.for_sale||0).toLocaleString()}</div><div class="cs-lbl">For Sale</div></div>
        <div class="cs sold"><div class="cs-val">${(row.sold_total||0).toLocaleString()}</div><div class="cs-lbl">Sold</div></div>
        <div class="cs rent"><div class="cs-val">${(row.for_rent||0).toLocaleString()}</div><div class="cs-lbl">For Rent</div></div>
        <div class="cs leased"><div class="cs-val">${(row.leased||0).toLocaleString()}</div><div class="cs-lbl">Leased</div></div>
      </div>
      <div style="margin-top:10px;">
        <span class="delta-pill ${saleDelta !== null && saleDelta !== undefined ? 'has-data' : 'no-data'}">
          ${saleDelta !== null && saleDelta !== undefined ? `+${saleDelta} new For Sale today` : 'delta tracking active — day 2+'}
        </span>
      </div>`;
    div.onclick = () => showPage('detail', row.agency_slug);
    grid.appendChild(div);
  });
}

// ─── COMPARE ───────────────────────────────────────────────────────────────
function renderCompare() {
  const el = document.getElementById('page-compare');
  el.innerHTML = `
    <div class="compare-section">
      <div class="section-label">For Sale — active listings</div>
      <div class="chart-card">
        <div class="chart-title">Active For Sale listings per platform</div>
        <div class="chart-note">All platforms · sorted by volume</div>
        <div id="legend-sale" class="legend"></div>
        <div class="chart-wrap" style="height:260px;"><canvas id="chartSale" role="img" aria-label="Bar chart of For Sale listings per competitor"></canvas></div>
      </div>
    </div>
    <div class="compare-section">
      <div class="two-col">
        <div class="chart-card">
          <div class="chart-title">Sold (12 months)</div>
          <div class="chart-note">Completed sale transactions</div>
          <div id="legend-sold" class="legend"></div>
          <div class="chart-wrap" style="height:240px;"><canvas id="chartSold" role="img" aria-label="Bar chart of sold properties"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Rental activity</div>
          <div class="chart-note">For Rent + Leased (12mo) stacked</div>
          <div id="legend-rent" class="legend"></div>
          <div class="chart-wrap" style="height:240px;"><canvas id="chartRent" role="img" aria-label="Stacked bar chart of rental activity"></canvas></div>
        </div>
      </div>
    </div>
    <div class="compare-section">
      <div class="two-col">
        <div class="chart-card">
          <div class="chart-title">For Sale market share</div>
          <div class="chart-note">% of total listings across all platforms</div>
          <div id="legend-pie" class="legend"></div>
          <div class="chart-wrap" style="height:220px;"><canvas id="chartPie" role="img" aria-label="Doughnut chart of market share"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Sale conversion rate</div>
          <div class="chart-note">Sold ÷ (For Sale + Sold)</div>
          <div id="legend-conv" class="legend"></div>
          <div class="chart-wrap" style="height:220px;"><canvas id="chartConv" role="img" aria-label="Bar chart of conversion rates"></canvas></div>
        </div>
      </div>
    </div>`;

  const bySale = [...DATA].sort((a,b) => (b.for_sale||0)-(a.for_sale||0));
  const bySold = [...DATA].sort((a,b) => (b.sold_total||0)-(a.sold_total||0));
  const byRent = [...DATA].sort((a,b) => ((b.for_rent||0)+(b.leased||0))-((a.for_rent||0)+(a.leased||0)));
  const lbl = arr => arr.map(r => COMP_META[r.agency_slug]?.shortName || r.agency_slug);
  const bg  = arr => arr.map(r => (COMP_META[r.agency_slug]?.color||'#888')+'99');
  const bd  = arr => arr.map(r => COMP_META[r.agency_slug]?.color||'#888');
  const gO  = (extra={}) => ({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#5a6278',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
            y:{ticks:{color:'#5a6278',font:{size:11},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,0.04)'}}}, ...extra});

  buildLegend('legend-sale', bySale);
  charts.sale = new Chart(document.getElementById('chartSale'), {type:'bar',data:{labels:lbl(bySale),datasets:[{data:bySale.map(r=>r.for_sale||0),backgroundColor:bg(bySale),borderColor:bd(bySale),borderWidth:1,borderRadius:5}]},options:gO()});

  buildLegend('legend-sold', bySold);
  charts.sold = new Chart(document.getElementById('chartSold'), {type:'bar',data:{labels:lbl(bySold),datasets:[{data:bySold.map(r=>r.sold_total||0),backgroundColor:bg(bySold),borderColor:bd(bySold),borderWidth:1,borderRadius:5}]},options:gO()});

  buildLegend('legend-rent', byRent, r=>`${COMP_META[r.agency_slug]?.shortName} (rent+leased)`);
  charts.rent = new Chart(document.getElementById('chartRent'), {type:'bar',data:{labels:lbl(byRent),datasets:[
    {label:'For Rent',data:byRent.map(r=>r.for_rent||0),backgroundColor:bg(byRent),borderColor:bd(byRent),borderWidth:1},
    {label:'Leased',  data:byRent.map(r=>r.leased||0),  backgroundColor:byRent.map(r=>(COMP_META[r.agency_slug]?.color||'#888')+'33'),borderColor:byRent.map(r=>(COMP_META[r.agency_slug]?.color||'#888')+'77'),borderWidth:1},
  ]},options:gO({scales:{x:{stacked:true,ticks:{color:'#5a6278',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{stacked:true,ticks:{color:'#5a6278',font:{size:11},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,0.04)'}}}})}); 

  const totalSale = DATA.reduce((s,r)=>s+(r.for_sale||0),0);
  buildLegend('legend-pie', bySale, r=>`${COMP_META[r.agency_slug]?.shortName} ${(((r.for_sale||0)/totalSale)*100).toFixed(1)}%`);
  charts.pie = new Chart(document.getElementById('chartPie'), {type:'doughnut',data:{labels:bySale.map(r=>COMP_META[r.agency_slug]?.shortName),datasets:[{data:bySale.map(r=>r.for_sale||0),backgroundColor:bySale.map(r=>(COMP_META[r.agency_slug]?.color||'#888')+'cc'),borderColor:bySale.map(r=>COMP_META[r.agency_slug]?.color||'#888'),borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw.toLocaleString()} (${((ctx.raw/totalSale)*100).toFixed(1)}%)`}}}}});

  const convSorted = [...DATA].map(r=>({...r,conv:((r.sold_total||0)/((r.for_sale||0)+(r.sold_total||0))*100)||0})).sort((a,b)=>b.conv-a.conv);
  buildLegend('legend-conv', convSorted, r=>`${COMP_META[r.agency_slug]?.shortName} ${r.conv.toFixed(1)}%`);
  charts.conv = new Chart(document.getElementById('chartConv'), {type:'bar',data:{labels:convSorted.map(r=>COMP_META[r.agency_slug]?.shortName),datasets:[{data:convSorted.map(r=>parseFloat(r.conv.toFixed(1))),backgroundColor:convSorted.map(r=>(COMP_META[r.agency_slug]?.color||'#888')+'99'),borderColor:convSorted.map(r=>COMP_META[r.agency_slug]?.color||'#888'),borderWidth:1,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a6278',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{max:100,ticks:{color:'#5a6278',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function buildLegend(id, rows, lFn) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = rows.map(r => {
    const m = COMP_META[r.agency_slug] || {shortName:r.agency_slug, color:'#888'};
    return `<span class="legend-item"><span class="legend-dot" style="background:${m.color}"></span>${lFn?lFn(r):m.shortName}</span>`;
  }).join('');
}

// ─── LEADERBOARD ───────────────────────────────────────────────────────────
function renderLeaderboard() {
  const el = document.getElementById('page-leaderboard');
  const maxS = Math.max(...DATA.map(r=>r.for_sale||0));
  const maxR = Math.max(...DATA.map(r=>r.for_rent||0));
  const saleSorted = [...DATA].sort((a,b)=>(b.for_sale||0)-(a.for_sale||0));
  const rentSorted = [...DATA].sort((a,b)=>(b.for_rent||0)-(a.for_rent||0));

  const saleRows = saleSorted.map((r,i)=>{
    const m=COMP_META[r.agency_slug]||{};
    const conv=((r.sold_total||0)/((r.for_sale||0)+(r.sold_total||0))*100)||0;
    const pct=((r.for_sale||0)/maxS*100).toFixed(0);
    return `<tr class="rank-${i+1}"><td class="rank-num">${i+1}</td>
      <td><div class="name-cell"><span class="comp-dot" style="background:${m.color||'#888'}"></span>${m.name||r.agency_slug}${m.isUs?'<span class="us-tag">us</span>':''}</div></td>
      <td class="num-cell" style="color:var(--sale-c)">${(r.for_sale||0).toLocaleString()}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${m.color||'#888'}"></div></div></td>
      <td class="num-cell" style="color:var(--sold-c)">${(r.sold_total||0).toLocaleString()}</td>
      <td class="num-cell" style="color:var(--rent-c)">${(r.for_rent||0).toLocaleString()}</td>
      <td class="num-cell" style="color:var(--leased-c)">${(r.leased||0).toLocaleString()}</td>
      <td class="num-cell">${conv.toFixed(1)}%</td></tr>`;
  }).join('');

  const rentRows = rentSorted.map((r,i)=>{
    const m=COMP_META[r.agency_slug]||{};
    const conv=(r.leased||0)>0?(((r.leased||0)/((r.for_rent||0)+(r.leased||0))*100)).toFixed(1)+'%':'--';
    const pct=((r.for_rent||0)/maxR*100).toFixed(0);
    return `<tr class="rank-${i+1}"><td class="rank-num">${i+1}</td>
      <td><div class="name-cell"><span class="comp-dot" style="background:${m.color||'#888'}"></span>${m.name||r.agency_slug}${m.isUs?'<span class="us-tag">us</span>':''}</div></td>
      <td class="num-cell" style="color:var(--rent-c)">${(r.for_rent||0).toLocaleString()}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${m.color||'#888'}"></div></div></td>
      <td class="num-cell" style="color:var(--leased-c)">${(r.leased||0).toLocaleString()}</td>
      <td class="num-cell">${conv}</td></tr>`;
  }).join('');

  el.innerHTML = `
    <div class="compare-section">
      <div class="section-label">For Sale — ranked</div>
      <div class="table-wrap"><table class="lb-table"><thead><tr><th>#</th><th>Platform</th><th>For Sale</th><th style="width:180px">Bar</th><th>Sold (12mo)</th><th>For Rent</th><th>Leased</th><th>Conv %</th></tr></thead><tbody>${saleRows}</tbody></table></div>
    </div>
    <div class="compare-section" style="margin-top:22px;">
      <div class="section-label">For Rent — ranked</div>
      <div class="table-wrap"><table class="lb-table"><thead><tr><th>#</th><th>Platform</th><th>For Rent</th><th style="width:180px">Bar</th><th>Leased (12mo)</th><th>Lease conv %</th></tr></thead><tbody>${rentRows}</tbody></table></div>
    </div>`;
}

// ─── DETAIL ────────────────────────────────────────────────────────────────
function renderDetail() {
  const row  = DATA.find(r => r.agency_slug === detailSlug);
  const meta = COMP_META[detailSlug] || { name: row?.agency_name, color:'#888', isUs:false };
  const snaps = SNAPSHOTS[detailSlug] || {};
  const hist  = HISTORY[detailSlug]   || [];
  const el    = document.getElementById('page-detail');

  const types = [
    ['sale',  'For Sale',  'var(--sale-c)'],
    ['sold',  'Sold',      'var(--sold-c)'],
    ['lease', 'For Rent',  'var(--rent-c)'],
    ['leased','Leased',    'var(--leased-c)'],
  ];

  const deltaBoxes = types.map(([t,l,col]) => {
    const s = snaps[t]; const n = s?.new_since_yesterday;
    return `<div class="delta-box">
      <div class="delta-type" style="color:${col}">${l}</div>
      ${n !== null && n !== undefined
        ? `<div class="delta-num" style="color:${col}">+${n}</div>`
        : `<div class="delta-na">—</div>`}
      <div class="delta-sub">total: ${(s?.total_count||0).toLocaleString()}</div>
      <div class="delta-sub" style="opacity:.6">anchor: ${s?.anchor_id||'none'}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <button class="back-btn" onclick="showPage('overview')">← Back to overview</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <span style="width:10px;height:10px;border-radius:50%;background:${meta.color};display:inline-block;"></span>
      <div class="detail-name">${meta.name}</div>
      ${meta.isUs ? '<span class="us-badge">Our platform</span>' : ''}
    </div>
    <div class="detail-slug">domain.com.au/real-estate-agencies/${detailSlug}/</div>

    <div class="stat-grid fade">
      <div class="stat-card sale"><div class="stat-lbl">For Sale</div><div class="stat-val">${(row?.for_sale||0).toLocaleString()}</div><div class="stat-sub">12-month window</div></div>
      <div class="stat-card sold"><div class="stat-lbl">Sold (12mo)</div><div class="stat-val">${(row?.sold_total||0).toLocaleString()}</div><div class="stat-sub">completed</div></div>
      <div class="stat-card rent"><div class="stat-lbl">For Rent</div><div class="stat-val">${(row?.for_rent||0).toLocaleString()}</div><div class="stat-sub">active</div></div>
      <div class="stat-card leased"><div class="stat-lbl">Leased (12mo)</div><div class="stat-val">${(row?.leased||0).toLocaleString()}</div><div class="stat-sub">completed</div></div>
    </div>

    <div class="section-label fade">New listings — 24h delta</div>
    <div class="delta-row fade">${deltaBoxes}</div>

    ${hist.length > 1 ? `
    <div class="section-label fade">For Sale trend over time</div>
    <div class="history-chart-card fade">
      <div class="chart-wrap" style="height:200px;">
        <canvas id="histChart" role="img" aria-label="Line chart of For Sale listings over time for ${meta.name}">Historical For Sale trend.</canvas>
      </div>
    </div>` : ''}

    <div class="section-label fade">Recent page 1 listings</div>
    <div class="table-wrap fade">
      <div class="table-head">
        <div class="tab-row">
          ${types.map(([t,l]) => `<button class="ltab ${t} ${t===detailTab?'active':''}" onclick="switchDTab('${t}')">${l} (${(snaps[t]?.total_count||0).toLocaleString()})</button>`).join('')}
        </div>
        <div class="total-tag" id="dTableTotal"></div>
      </div>
      <div id="dTableBody"></div>
    </div>`;

  // Trend chart
  if (hist.length > 1) {
    setTimeout(() => {
      const ctx = document.getElementById('histChart');
      if (!ctx) return;
      charts.hist = new Chart(ctx, {
        type: 'line',
        data: {
          labels: hist.map(r => r.scraped_at_melb?.split(' ')[0] || ''),
          datasets: [{
            data: hist.map(r => r.for_sale || 0),
            borderColor: meta.color, backgroundColor: meta.color + '15',
            borderWidth: 2, pointRadius: 3, tension: 0.3, fill: true,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color:'#5a6278', font:{size:10}, maxRotation:0, autoSkip:true }, grid:{color:'rgba(255,255,255,0.04)'} },
            y: { ticks: { color:'#5a6278', font:{size:10} }, grid:{color:'rgba(255,255,255,0.04)'} },
          }
        }
      });
    }, 50);
  }

  renderDetailTable();
}

function switchDTab(t) {
  detailTab = t;
  document.querySelectorAll('.ltab').forEach(el => {
    el.classList.remove('active');
    if (el.getAttribute('onclick')?.includes(`'${t}'`)) el.classList.add('active');
  });
  renderDetailTable();
}

function renderDetailTable() {
  const snap = SNAPSHOTS[detailSlug]?.[detailTab];
  const body = document.getElementById('dTableBody');
  const tot  = document.getElementById('dTableTotal');
  if (!body) return;
  if (tot) tot.textContent = snap ? `page 1 snapshot · ${(snap.total_count||0).toLocaleString()} total` : '';
  if (!snap) { body.innerHTML = `<div style="padding:28px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);">No snapshot data yet.</div>`; return; }

  let ids = [];
  try { ids = JSON.parse(snap.page1_ids || '[]'); } catch(e) {}
  if (!ids.length) { body.innerHTML = `<div style="padding:28px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);">No page 1 IDs cached.</div>`; return; }

  const isSold = detailTab === 'sold' || detailTab === 'leased';
  body.innerHTML = `<table>
    <thead><tr><th>Listing ID</th><th>Link</th></tr></thead>
    <tbody>${ids.map(id => `<tr>
      <td class="mono">${id}</td>
      <td><a href="https://www.domain.com.au/${id}" target="_blank">↗ view on Domain</a></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
